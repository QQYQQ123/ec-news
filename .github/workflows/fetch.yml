name: Daily E-Commerce News

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install feedparser requests

      - name: Run fetcher
        run: python fetch_news.py

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add news.json
          git diff --quiet && echo "No changes, skip commit" || git commit -m "Update $(date '+%Y-%m-%d %H:%M')"
          git push
